name: Tests

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  php-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: fintrack
          POSTGRES_PASSWORD: secret
          POSTGRES_DB: fintrack_testing
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U fintrack -d fintrack_testing"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml, ctype, json, pdo, pdo_pgsql
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Run migrations
        env:
          APP_ENV: testing
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: fintrack_testing
          DB_USERNAME: fintrack
          DB_PASSWORD: secret
        run: php artisan migrate --force

      - name: Run tests
        env:
          APP_ENV: testing
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: fintrack_testing
          DB_USERNAME: fintrack
          DB_PASSWORD: secret
        run: php artisan test
