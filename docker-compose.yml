services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fintrack_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
      - /var/www/html/node_modules
    environment:
      - APP_ENV=local
    networks:
      - fintrack

  nginx:
    image: nginx:alpine
    container_name: fintrack_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - fintrack

  postgres:
    image: postgres:16-alpine
    container_name: fintrack_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-fintrack}
      POSTGRES_USER: ${DB_USERNAME:-fintrack}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "5433:5432"   # 5433 no host para não conflitar com Postgres local
    volumes:
      - fintrack_postgres_data:/var/lib/postgresql/data
    networks:
      - fintrack

  redis:
    image: redis:alpine
    container_name: fintrack_redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    networks:
      - fintrack

networks:
  fintrack:
    driver: bridge

volumes:
  fintrack_postgres_data:
    driver: local
